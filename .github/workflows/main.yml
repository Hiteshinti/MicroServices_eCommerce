name: Build and Docker Image (Local Only)

on:
  push:
    branches:
      - main

jobs:
  build-publish-docker:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2️⃣ Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    # 3️⃣ Restore
    - name: Restore
      run: dotnet restore

    # 4️⃣ Build (Release)
    - name: Build
      run: dotnet build --configuration Release --no-restore

    # 5️⃣ ✅ Run Tests (NEW STEP)
    - name: Test
      run: dotnet test --no-build --verbosity normal

    # 6️⃣ Publish (only if tests pass)
    - name: Publish
      run: dotnet publish --configuration Release --no-build -o ./publish

    # 7️⃣ Build Docker Image (ONLY if all above succeed)
    - name: Build Docker Image
      if: success()
      run: docker build . --file Dockerfile --tag my-image:${{ github.sha }}
