name: .NET Release

on:
  push:
    branches: [ "master" ]

  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore eCommerce.API.csproj

    - name: Build project
      run: dotnet build eCommerce.API.csproj --configuration Release --no-restore

    - name: Run tests
      run: dotnet test eCommerce.API.csproj --no-build --verbosity normal
      continue-on-error: true

    - name: Publish project
      run: dotnet publish eCommerce.API.csproj --configuration Release --output ./publish

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ecommerce-api
        path: ./publish
