services:
  ecommerce.api:
    container_name: ecommerce.api
    image: userserviceapp:latest
    build:
      context: .
      dockerfile: eCommerce.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ASPNETCORE_URLS=http://+:7070
    ports:
      - "7070:7070"
    networks:
      - ocelot-shared-network

networks:
  ocelot-shared-network:
    external: true